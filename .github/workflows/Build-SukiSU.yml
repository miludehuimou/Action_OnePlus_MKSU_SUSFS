name: OnePlus Kernel Builder
on:
  workflow_dispatch:
    inputs:
      CPU:
        description: "SOC型号"
        required: true
        default: 'sm8550'
        type: choice
        options:
          - sm8550
          - sm8650
      FEIL:
        description: "配置文件"
        required: true
        default: 'oneplus_ace2pro_v'
      CPUD:
        description: "处理器代号"
        required: true
        default: 'kalama'
      ANDROID_VERSION:
        description: "Android版本"
        required: true
        default: 'android13'
        type: choice
        options:
          - android13
          - android14
      KERNEL_VERSION:
        description: "内核版本"
        required: true
        default: '5.15'
        type: choice
        options:
          - 5.15
          - 4.14
      KERNEL_NAME:
        description: "内核名称"
        required: true
        default: '--android13-8-0-01123-996545487552b-Lzbs-ll'
      kernelsu_variant:
        description: "选择SU类型"
        required: true
        type: choice
        options:
          - KernelSU
          - SukiSU
        default: SukiSU
      kernelsu_version:
        description: "SU版本"
        required: true
        type: choice
        options:
          - stable
          - beta
          - development
        default: stable
      SUSFS_ENABLED:
        description: "启用SUSFS"
        required: true
        type: boolean
        default: true
      VFS_patch_ENABLED:
        description: "启用新钩子补丁"
        required: true
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
    environment:
      name: kernel-build
      protection_rules:
        - required_contexts: []

    steps:
      - name: 🛠️ 最大化构建空间
        uses: easimon/maximize-build-space@v2
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-unused: 'true'

      - name: 📦 安装构建依赖
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y make gcc-aarch64-linux-gnu \
                          python3 python3-pip bc git \
                          libssl-dev flex bison \
                          curl zip unzip wget

      - name: 🐍 安装Python依赖
        run: |
          pip3 install --user repo

      - name: 🔧 配置Git
        run: |
          git config --global user.name "ychenxuan"
          git config --global user.email "3494167979@qq.com"

      - name: 📁 初始化工作目录
        run: |
          mkdir -p $GITHUB_WORKSPACE/kernel_workspace
          cd $GITHUB_WORKSPACE/kernel_workspace

      - name: 🎛️ 同步内核仓库
        run: |
          PATH="$HOME/.local/bin:$PATH" repo init \
            -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b refs/heads/oneplus/${{ inputs.CPU }} \
            -m ${{ inputs.FEIL }}.xml --depth=1
          PATH="$HOME/.local/bin:$PATH" repo sync -c -j$(nproc)

      - name: 🛡️ 清理保护文件
        run: |
          find . -name 'abi_gki_protected_exports_*' -delete
          sed -i 's/-dirty//g' **/scripts/setlocalversion

      - name: 🧩 选择SU版本
        id: ksu-version
        run: |
          if [[ "${{ inputs.kernelsu_version }}" == "stable" ]]; then
            echo "BRANCH=-" >> $GITHUB_ENV
          elif [[ "${{ inputs.kernelsu_version }}" == "beta" ]]; then
            echo "BRANCH=-s susfs-stable" >> $GITHUB_ENV
          else
            echo "BRANCH=-s main" >> $GITHUB_ENV
          fi

      - name: 🧬 集成KernelSU/SukiSU
        if: inputs.kernelsu_variant == 'SukiSU'
        run: |
          cd kernel_platform
          curl -LSs "https://raw.githubusercontent.com/ShirkNeko/KernelSU/main/kernel/setup.sh" | bash ${{ env.BRANCH }}
          cd KernelSU
          KSU_VERSION=$(expr $(git rev-list --count HEAD) + 12505)
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV

      - name: 📜 应用SUSFS补丁
        if: inputs.SUSFS_ENABLED && inputs.kernelsu_variant == 'SukiSU'
        run: |
          cd $GITHUB_WORKSPACE
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git \
            -b gki-${{ inputs.ANDROID_VERSION }}-${{ inputs.KERNEL_VERSION }}
          cd kernel_workspace/kernel_platform/common
          patch -p1 < ../../susfs4ksu/kernel_patches/50_add_susfs_in_gki-*.patch

      - name: 🕶️ 应用隐藏功能补丁
        if: inputs.SUSFS_ENABLED
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/kernel_platform/common
          patch -p1 < ../../SukiSU_patch/69_hide_stuff.patch

      - name: 🪝 应用新钩子补丁
        if: inputs.VFS_patch_ENABLED
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/kernel_platform/common
          patch -p1 < ../../SukiSU_patch/hooks/new_hooks.patch

      - name: ⚙️ 配置内核选项
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/kernel_platform
          echo "CONFIG_KSU=y" >> common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS=y" >> common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_LOCALVERSION=${{ inputs.KERNEL_NAME }}" >> common/arch/arm64/configs/gki_defconfig
          if [[ "${{ inputs.VFS_patch_ENABLED }}" == 'true' ]]; then
            echo "CONFIG_KSU_MANUAL_HOOK=y" >> common/arch/arm64/configs/gki_defconfig
          fi

      - name: 🛠️ 构建内核
        env:
          ARCH: arm64
          CROSS_COMPILE: aarch64-linux-gnu-
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          if [[ "${{ inputs.CPU }}" == "sm8650" ]]; then
            ./kernel_platform/build_with_bazel.py -t ${{ inputs.CPUD }} gki
          else
            LTO=thin ./kernel_platform/oplus/build/oplus_build_kernel.sh ${{ inputs.CPUD }} gki
          fi

      - name: 🛠️ 应用自定义补丁
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/kernel_platform/out/msm-kernel-${{ inputs.CPUD }}-gki/dist/
          if [ -f ../../patch ]; then
            chmod +x ../../patch
            ./patch Image
          fi

      - name: 📦 打包AnyKernel3
        run: |
          cd $GITHUB_WORKSPACE
          git clone --depth=1 https://github.com/Kernel-SU/AnyKernel3
          cp kernel_workspace/kernel_platform/out/msm-kernel-${{ inputs.CPUD }}-gki/dist/Image AnyKernel3/
          cp kernel_workspace/kernel_platform/out/msm-kernel-${{ inputs.CPUD }}-gki/dist/Image kernel_workspace/kernel

      - name: 🚀 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-${{ inputs.FEIL }}-${{ env.KSUVER }}
          path: |
            AnyKernel3/*
            kernel_workspace/kernel

      - name: 📝 生成构建报告
        run: |
          cd $GITHUB_WORKSPACE
          echo "构建完成于：$(date)" > build_report.txt
          echo "内核版本：${{ inputs.KERNEL_NAME }}" >> build_report.txt
          echo "SU版本：${{ env.KSUVER }}" >> build_report.txt
          echo "构建耗时：$(($(date +%s) - $GITHUB_ACTIONS_START_TIME))s" >> build_report.txt
          cat build_report.txt

      - name: 📧 通知构建结果
        uses: appleboy/telegram-action@master
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: "OnePlus内核构建完成\n状态：${{ job.status }}\n产物：[下载](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          parse_mode: Markdown
